<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RefineX - Dead Code Eliminator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
        }

        navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: #111111;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #a0a0ff;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            margin-left: 30px;
            font-size: 16px;
        }

        .nav-links a:hover {
            color: #a0a0ff;
        }

        .hero {
            text-align: center;
            padding: 100px 20px;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #a0a0ff;
        }

        .hero p {
            font-size: 18px;
            color: #aaaaaa;
            margin-bottom: 40px;
        }

        .upload-section {
            max-width: 600px;
            margin: 0 auto;
            background-color: #111111;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        textarea {
            width: 100%;
            height: 200px;
            background-color: #1a1a1a;
            color: #ffffff;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            font-size: 14px;
            resize: vertical;
            margin-bottom: 20px;
        }

        .or-divider {
            text-align: center;
            color: #666;
            margin: 15px 0;
            font-size: 14px;
        }

        input[type="file"] {
            width: 100%;
            padding: 10px;
            background-color: #1a1a1a;
            color: #aaaaaa;
            border: 1px dashed #444;
            border-radius: 8px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #a0a0ff;
            color: #000000;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #8080ff;
        }

        #results {
            max-width: 600px;
            margin: 40px auto;
            display: none;
        }

        #results h2 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #a0a0ff;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #1a1a1a;
            padding: 12px;
            text-align: left;
            color: #a0a0ff;
            border-bottom: 1px solid #333;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #222;
            color: #cccccc;
            font-size: 14px;
        }

        tr:hover {
            background-color: #1a1a1a;
        }
    </style>
</head>
<body>

    <navbar>
        <div class="logo">RefineX</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Analyzer</a>
            <a href="#">About</a>
        </div>
    </navbar>

    <div class="hero">
        <h1>Dead Code Eliminator</h1>
        <p>Upload or paste your code and find unused functions, variables and imports instantly</p>

        <div class="upload-section">
            <textarea id="codeInput" placeholder="Paste your Python code here..."></textarea>

            <div class="or-divider">— OR —</div>

            <input type="file" id="fileInput" accept=".py">

            <button onclick="analyzeCode()">Analyze</button>
        </div>
    </div>

    <div id="results">
        <h2>Results</h2>
        <table>
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Name</th>
                    <th>Message</th>
                </tr>
            </thead>
            <tbody id="resultsBody">
            </tbody>
        </table>
    </div>

    <script>
        async function analyzeCode() {
    const formData = new FormData();
    const fileInput = document.getElementById("fileInput");
    const codeInput = document.getElementById("codeInput").value;

    if (fileInput.files.length > 0) {
        formData.append("file", fileInput.files[0]);
    } else if (codeInput.trim() !== "") {
        const blob = new Blob([codeInput], { type: "text/plain" });
        formData.append("file", blob, "pasted_code.py");
    } else {
        alert("Please upload a file or paste your code!");
        return;
    }

    try {
        const response = await fetch("/analyze", {
            method: "POST",
            body: formData
        });

        const data = await response.json();
        console.log("Response:", data);
        const results = data.results;

        if (results.length === 0) {
            alert("No dead code found!");
            return;
        }

        const tbody = document.getElementById("resultsBody");
        tbody.innerHTML = "";

        results.forEach(item => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${item.type}</td>
                <td>${item.name}</td>
                <td>${item.message}</td>
            `;
            tbody.appendChild(row);
        });

        document.getElementById("results").style.display = "block";
        document.getElementById("results").scrollIntoView({ behavior: "smooth" });

    } catch(err) {
        console.log("Error:", err);
        alert("Something went wrong: " + err);
    }
}
    </script>

</body>
</html>
